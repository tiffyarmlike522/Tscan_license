name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip pyinstaller
          choco install innosetup --yes --no-progress

      - name: Run tests
        run: |
          python -m unittest discover -s tests
          python -m compileall src run_app.py tests
          python .\run_app.py --smoke-test

      - name: Build installed app
        run: |
          pyinstaller --clean --noconfirm --windowed --name TscanLicense --paths src --add-data "data\license_rules.json;data" run_app.py
          Get-FileHash -Algorithm SHA256 .\dist\TscanLicense\TscanLicense.exe | Tee-Object -FilePath .\dist\TscanLicense.exe.sha256.txt

      - name: Build installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" ".\installer\TscanLicense.iss"
          Get-FileHash -Algorithm SHA256 .\dist\TscanLicenseSetup.exe | Tee-Object -FilePath .\dist\TscanLicenseSetup.exe.sha256.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TscanLicense-windows
          path: |
            dist/TscanLicense.exe.sha256.txt
            dist/TscanLicenseSetup.exe
            dist/TscanLicenseSetup.exe.sha256.txt
